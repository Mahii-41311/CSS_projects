<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card</title>
    <link rel="stylesheet" href="./index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<style>

</style>

<body>
    <h1 style="color:orangered"><strong>Order History</strong></h1>
    <div class="container">
        <div class="head">
            <div class="con2">
                <h2><strong>Order #12345</strong></h2>
                <button class="btn">DELIVERED</button>
            </div>
            <h5 style="color: white;">March 5,2024</h5>
        </div>
        <div class="icon">
            <i class="fa-solid fa-image"></i>
            <i class="fa-solid fa-image"></i>
            <i class="fa-solid fa-image"></i>
            <div class="heading">
                <h5 style="color: white;">3items</h5>
                <h5 style="color: white;">$293.00</h5>
            </div>
            <div class="viewbtn">
                <button
                    style="background-color: orangered; color: white; border: 1px solid white;border-radius: 10px;">View
                    Details</button>
            </div>
        </div>
    </div>
    <div class="container">
        <div class="head">
            <div class="con2">
                <h2><strong>Order #12344</strong></h2>
                <button class="btn_1">SHIPPED</button>
            </div>
            <h5 style="color: white;">March 5,2024</h5>
        </div>
        <div class="icon">
            <i class="fa-solid fa-image"></i>
            <i class="fa-solid fa-image"></i>
            <div class="heading">
                <h5 style="color: white;">2items</h5>
                <h5 style="color: white;">Total:$199.96</h5>
            </div>
            <div class="viewbtn">
                <button
                    style="background-color: orangered; color: white; border: 1px solid white;border-radius: 10px;">View
                    Details</button>
            </div>
        </div>
    </div>
    <div class="container">
        <div class="head">
            <div class="con2">
                <h2><strong>Order #12343</strong></h2>
                <button class="btn_2">PROCESSING</button>
            </div>
            <h5 style="color: white;">March 5,2024</h5>
        </div>
        <div class="icon">
            <i class="fa-solid fa-image"></i>
            <div class="heading">
                <h5 style="color: white;">1items</h5>
                <h5 style="color: white;">Total:$99.99</h5>
            </div>
            <div class="viewbtn">
                <button
                    style="background-color: orangered; color: white; border: 1px solid white;border-radius: 10px;">View
                    Details</button>
            </div>
        </div>
    </div>
    <div class="container">
        <div class="head">
            <div class="con2">
                <h2><strong>Order #12343</strong></h2>
                <button class="btn_3">CANCELLED</button>
            </div>
            <h5 style="color: white;">February 20,2024</h5>
        </div>
        <div class="icon">
            <i class="fa-solid fa-image"></i>
            <i class="fa-solid fa-image"></i>
            <div class="heading">
                <h5 style="color: white;">2items</h5>
                <h5 style="color: white;">Total:$99.96</h5>
            </div>
            <div class="viewbtn">
                <button
                    style="background-color: orangered; color: white; border: 1px solid white;border-radius: 10px;">View
                    Details</button>
            </div>
        </div>
    </div>
</body>

</html>
