<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .square{
        border-radius: 20%;
        border: 1px solid blueviolet;
        height: 80px;
        width: 50px;
        position: relative;
        animation: square 5s ease-in infinite;
        background-color: red;
    }
    @keyframes square {
        0% {left: 0px;}
        25% {left: 25px;}
        50% {left: 50px;}
        75% {left: 85px;}
        100% {left: 100px;}
        
    }
</style>
<body>
    <div class="square">

    </div>
</body>
</html>
