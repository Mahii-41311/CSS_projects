<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ball</title>
    <style>
.ball{
    border-radius: 50%;
    border: 1px solid green;
    width: 50px;
    height: 50px;
    position: relative;
    animation: bounce 5s ease-in-out infinite;
    background-color: yellow;
}
@keyframes bounce {
 0% {top: 0px;}
 25% {top: 200px;}
 50% {top:300px;}
 70% {top:400px;}
 100% {top:500px;}
}
    </style>
</head>
<body>
    <h1>This is a ball</h1>
    <div class="ball">

    </div>
</body>
</html>
