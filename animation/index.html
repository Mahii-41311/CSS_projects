<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .btn{
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 50px;
           
        }
        .sub{
            background-color: blue;
           padding: 10px;
            border: 1px solid grey;
          animation: trans 5s ease-in-out infinite;
             
        }
        .square{
            border: 1px solid black;
            border-radius: 10px;
            width: 60px;
            height: 60px;
           animation: square 5s ease-in-out infinite;

        }
        @keyframes trans {
            0%{transform: scale(1);}
            50%{transform: scale(1.2);}
            100%{transform: scale(4);}
            
        }
        @keyframes square {
            /* from{transform: translateX(0);}
            to{transform: translate(200px,300px);} */
from{transform: rotate(0deg)translateY(0)}
to{transform: rotate(360deg)translateY(300px) }
          
        }
    </style>
</head>
<body>
    <div class="btn">
        <button class="sub">Submit</button>
    </div>
    <div class="square">

    </div>

    

</body>
</html>
