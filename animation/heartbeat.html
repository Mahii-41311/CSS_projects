<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .heart{
        border: 2px solid red;
        height: 50px;
        width: 50px;
        position: relative;
        animation: heartbeat 5s ease-in-out infinite;
    }
    @keyframes heartbeat{
        0%{top:0px;}
        25%{bottom: 10px;left: 100px;background-color: blueviolet;}
        50%{top: 30px;left: 200px;background-color: chocolate;}
        75%{bottom: 50px;left: 350px;background-color: red;}
        100%{top: 100px;left: 500px;background-color: yellowgreen;}


    }
</style>
<body>
    <div class="heart">

    </div>
</body>
</html>
